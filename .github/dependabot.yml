version: 2

# Notes:
# - minor/patch updates are grouped per ecosystem to reduce review churn.
# - major updates are kept ungrouped so each one gets its own PR — they
#   often involve breaking changes (e.g. electron 41 -> 42 Chromium bump,
#   eslint major flat-config tweaks) and deserve individual review.

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      lint-minor:
        patterns: ["eslint", "@eslint/*", "globals"]
        update-types: ["minor", "patch"]
      test-minor:
        patterns: ["jest", "@jest/*"]
        update-types: ["minor", "patch"]
      runtime-minor:
        patterns: ["electron", "electron-builder", "electron-updater"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
