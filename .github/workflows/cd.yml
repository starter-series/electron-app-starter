name: Build & Release

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

# Workflow-level grant is read-only. Each job below declares the elevated
# scopes it actually needs (least privilege), so a future regression in
# one step can't silently widen blast radius into another job.
permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  version-guard:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building v$VERSION"

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version first."
            exit 1
          fi

  build:
    needs: version-guard
    permissions:
      contents: read
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      # Cache the platform-specific electron binary and electron-builder's
      # compressed binaries (~150 MB per OS). Without this every dispatch
      # re-downloads from GitHub Releases on every runner. Keyed by OS
      # and the resolved electron version in package-lock.json so a
      # major bump invalidates correctly.
      - name: Cache electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ matrix.os }}-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: [version-guard, build]
    environment: production
    runs-on: ubuntu-latest
    # contents:write for the release publish.
    # id-token + attestations:write for SLSA build provenance — these
    # let third parties verify with `gh attestation verify` that the
    # binary really came from this workflow run.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      # SLSA Level 3 build provenance for every installer / archive
      # *and* the electron-updater metadata (latest*.yml). Attesting
      # the .yml matters because it carries the SHA the updater checks
      # — without it the auto-update trust chain has a gap.
      # Separate from code signing: signing proves *who* signed; this
      # attestation proves *which workflow run* produced the bytes.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.yml
            artifacts/*.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v${{ needs.version-guard.outputs.version }}
          name: v${{ needs.version-guard.outputs.version }}
          body: |
            ## Release v${{ needs.version-guard.outputs.version }}

            ### Downloads
            - **macOS:** `.dmg` (installer) + `.zip` (auto-update)
            - **Windows:** `.exe` (NSIS installer)
            - **Linux:** `.AppImage` + `.deb`

            ### Verify build provenance
            ```bash
            gh attestation verify <downloaded-file> \
              --repo ${{ github.repository }}
            ```

            ### Auto-Update
            Existing users with auto-update enabled will receive this update automatically.
          files: |
            artifacts/**/*
          generate_release_notes: true
