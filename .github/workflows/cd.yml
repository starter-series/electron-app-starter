name: Build & Release

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version-guard:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building v$VERSION"

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version first."
            exit 1
          fi

  build:
    needs: version-guard
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: [version-guard, build]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-guard.outputs.version }}
          name: v${{ needs.version-guard.outputs.version }}
          body: |
            ## Release v${{ needs.version-guard.outputs.version }}

            ### Downloads
            - **macOS:** `.dmg` (installer) + `.zip` (auto-update)
            - **Windows:** `.exe` (NSIS installer)
            - **Linux:** `.AppImage` + `.deb`

            ### Auto-Update
            Existing users with auto-update enabled will receive this update automatically.
          files: |
            artifacts/**/*
          generate_release_notes: true
