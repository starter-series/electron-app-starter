<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>My App</h1>
    <p class="subtitle">Your Electron app is running.</p>

    <div class="versions">
      <div class="version-item">
        <span class="label">Electron</span>
        <span id="electron-version" class="value">-</span>
      </div>
      <div class="version-item">
        <span class="label">Chrome</span>
        <span id="chrome-version" class="value">-</span>
      </div>
      <div class="version-item">
        <span class="label">Node</span>
        <span id="node-version" class="value">-</span>
      </div>
      <div class="version-item">
        <span class="label">App</span>
        <span id="app-version" class="value">-</span>
      </div>
    </div>

    <section class="ipc-panel" aria-labelledby="ipc-heading">
      <h2 id="ipc-heading">IPC bridge</h2>

      <div class="ipc-block">
        <h3>Request / response</h3>
        <p class="hint">window.api.getSystemInfo()</p>
        <pre id="system-info">loading...</pre>
      </div>

      <div class="ipc-block">
        <h3>Event subscription</h3>
        <p class="hint">window.api.onPowerEvent(cb) — try sleeping your laptop</p>
        <ul id="power-log" class="power-log">
          <li class="power-empty">waiting for power events...</li>
        </ul>
      </div>
    </section>

    <div id="update-banner" class="update-banner" hidden>
      Update downloaded. Restart to apply.
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
